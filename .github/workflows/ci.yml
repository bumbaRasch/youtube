name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  php-lint-test:
    name: PHP - Pint, PHPStan, Pest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, xml, zip, sqlite, intl

      - name: Validate composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --optimize-autoloader

      - name: Run Pint (format)
        run: vendor/bin/pint --verbose

      - name: Run PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --memory-limit=2G

      - name: Run tests (Pest)
        run: vendor/bin/pest --colors=never

      - name: CI smoke check for native binaries
        run: ./scripts/ci/check-binaries.sh || true
